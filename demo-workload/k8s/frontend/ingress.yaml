apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: kubeguardian-demo
  labels:
    app: frontend
    app.kubernetes.io/part-of: kubeguardian-demo
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: kubeguardian-demo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /simulate
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /status
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /ready
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /live
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
