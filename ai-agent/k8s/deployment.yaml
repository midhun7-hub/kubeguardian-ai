apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-agent
  namespace: kubeguardian-demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ai-agent

  template:
    metadata:
      labels:
        app: ai-agent

    spec:
      containers:
        - name: ai-agent

          image: 191072690914.dkr.ecr.ap-south-1.amazonaws.com/kubeguardian-ai-agent:latest

          ports:
            - containerPort: 8000

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "250m"
              memory: "256Mi"